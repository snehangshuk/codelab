# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1
orbs:
  go: circleci/go@0.2.0

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  codelabs:
    # Specify the execution environment. You can specify an image from Dockerhub or use one of our Convenience Images from CircleCI's Developer Hub.
    # See: https://circleci.com/docs/2.0/configuration-reference/#docker-machine-macos-windows-executor
    docker:
      - image: cimg/base:stable
    # Add steps to the job
    # See: https://circleci.com/docs/2.0/configuration-reference/#steps
    parameters:
      output_dir:
        type: string
        description: Name of the directory to output to
      inputs:
        type: string
        description: Input files, which can contain wildcards
    steps:
      - go/install
      - run: wget https://github.com/googlecodelabs/tools/releases/download/v2.2.4/claat-linux-amd64
      - run: chmod +x claat-linux-amd64
      - run: mkdir -p << parameters.output_dir >>
      - add_ssh_keys:
          fingerprints:
            - "SHA256:tl0voEj5iXMITkMD3xioGbTjUHIgjYDY8laKoH45bLU"
      - run: git clone git@github.com:snehangshuk/codelab.git
      - run: cd codelab 
      - run: ./claat-linux-amd64 export -o << parameters.output_dir >> << parameters.inputs >>
      - store_artifacts:
          path: mylabs
          destination: build-artifate


# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  codelabs-workflow:
    jobs:
      - codelabs:
          output_dir: mylabs
          inputs: codelabs/mylabs.md

